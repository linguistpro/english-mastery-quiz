<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Mastery Quiz</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

width:90%;
max-width:420px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;

}

.logo{

font-size:60px;

}

h1{

color:#2563eb;
margin-top:10px;

}

p{

color:#666;
margin:15px 0;

}

.card{

background:#eef4ff;
padding:15px;
border-radius:15px;
margin:20px 0;
text-align:left;

}

.card h3{

margin-bottom:10px;
color:#2563eb;

}

.item{

display:flex;
justify-content:space-between;
margin:8px 0;

}

button{

width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

.footer{

margin-top:20px;
font-size:14px;
color:#888;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">📘</div>

<h1>English Mastery Quiz</h1>

<p>Improve your Grammar, Vocabulary & Spoken English.</p>

<div class="card">

<h3>Your Progress</h3>

<div class="item">
<span>⭐ XP</span>
<span id="xp">0</span>
</div>

<div class="item">
<span>🏆 Level</span>
<span id="level">1</span>
</div>

<div class="item">
<span>📊 Best Score</span>
<span id="best">0</span>
</div>

<div class="item">
<span>🔥 Streak</span>
<span>1 Day</span>
</div>

</div>

<button onclick="startQuiz()">
🚀 Start Quiz
</button>

<div class="footer">

Made with ❤️ by LinguistPro

</div>

</div>

<script>

let xp=localStorage.getItem("xp")||0;

let best=localStorage.getItem("bestScore")||0;

let level=Math.floor(xp/100)+1;

document.getElementById("xp").innerHTML=xp;

document.getElementById("best").innerHTML=best;

document.getElementById("level").innerHTML=level;

function startQuiz(){

window.location.href="category.html";

}

</script>

</body>
</html>
