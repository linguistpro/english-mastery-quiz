<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Result</title>

}
<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
text-align:center;
width:90%;
max-width:400px;
}

.score{
font-size:50px;
font-weight:bold;
color:#2563eb;
}
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
  .progress-box{
width:100%;
height:18px;
background:#ddd;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress-fill{
width:0%;
height:100%;
background:#2563eb;
transition:1s;
border-radius:10px;
}
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Quiz Completed</h1>

<div class="score" id="score">0/20</div>

<p id="xp"></p>

<p id="level"></p> 
  <div class="progress-box">
    <div id="progressBar" class="progress-fill"></div>
</div>

<h3 id="grade"></h3>

<p id="message">Good Job!</p>

<button onclick="window.location='quiz.html'">
Play Again
</button>

</div>

<script>
let score=localStorage.getItem("score")||0;
let total=20;

document.getElementById("score").innerHTML=score+"/"+total;

let percent=(score/total)*100;

if(percent>=80){
document.getElementById("message").innerHTML="Excellent! 🏆";
}
else if(percent>=50){
document.getElementById("message").innerHTML="Good Job 👍";
}
else{
document.getElementById("message").innerHTML="Keep Practicing 💪";
}
</script>
<script src="result.js"></script>
</body>
  </html>
